apiVersion: v1
kind: Pod
metadata:
  name: nginx-affinity
  labels:
    env: test
spec:
  affinity:
      nodeAffinity:
      # Hard rule
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
          - matchExpressions:
            - key: topology.kubernetes.io/zone
              operator: In
              values:
              - us-east-1f
              - us-east-1a
      # Soft rule  
        preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          preference:
            matchExpressions:
            - key: project
              operator: In
              values:
              - roboshops
        - weight: 10
          preference:
            matchExpressions:
            - key: project
              operator: In
              values:
              - amazon
  containers:
  - name: nginx
    image: nginx